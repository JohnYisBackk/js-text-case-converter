<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Text Case Converter</title>
  </head>
  <body>
    <main class="app">
      <section class="converter-card">
        <header class="header">
          <div class="header-text">
            <p class="eyebrow">Text Utility Tool</p>
            <h1>Text Case Converter <span>PRO Version</span></h1>
            <p class="subtitle">
              Transform your text instantly with a clean and professional
              interface.
            </p>
          </div>
        </header>

        <section class="editor-section">
          <div class="input-box">
            <label for="textInput">Input Text</label>
            <textarea
              id="textInput"
              placeholder="Write or paste your text here.."
            ></textarea>
          </div>

          <div class="output-box">
            <label for="textInput">Converted Text</label>
            <textarea
              id="outputText"
              placeholder="Your Converted text will appear here.."
              readonly
            ></textarea>
          </div>
        </section>

        <section class="actions-section">
          <button class="action-btn" id="upperCaseBtn">UPPERCASE</button
          ><button class="action-btn" id="lowerCaseBtn">lowercase</button
          ><button class="action-btn" id="capitalizeBtn">Capitalize</button
          ><button class="action-btn" id="removeSpacesBtn">Remove Spaces</button
          ><button class="action-btn secondary-btn" id="copyBtn">
            Copy Text</button
          ><button class="action-btn danger-btn" id="clearBtn">
            Clear All
          </button>
        </section>

        <footer class="footer-stats">
          <div class="stat-item">
            <span class="stat-label">Characters</span>
            <strong id="charactersCount">0</strong>
          </div>

          <div class="stat-item">
            <span class="stat-label">Words</span>
            <strong id="wordsCount">0</strong>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
